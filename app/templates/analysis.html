<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/svg+xml" href="/static/icon/favicon.svg" />

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .login-scene {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0px 16px;
            min-height: 100vh;
            gap: 16px;
        }

        .login-card {
            width: 100%;
            max-width: 320px;
            border-radius: 16px;
            padding: 30px 20px 12px;
            box-shadow: var(--glass-shadow);
            animation: fadeUp 0.3s ease-out;
            overflow: hidden;
        }

        .login-card-body {
            padding-bottom: 24px;
        }

        .login-card-footer {
            border-top: 1px solid var(--border);
            padding: 10px 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-info {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
        }

        .brand-info img {
            width: 14px;
            height: 14px;
        }

        .footer-meta {
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .login-bottom {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .report-scene {
            display: none;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 52px;
            padding: 0 16px 0 20px;
            border-bottom: 1px solid var(--border);
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            flex-shrink: 0;
            z-index: 100;
        }

        .topbar-brand {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
        }

        .topbar-brand img {
            width: 16px;
            height: 16px;
        }

        .topbar-meta {
            flex: 1;
            text-align: center;
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 0.04em;
            padding: 0 12px;
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .topbar-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 5px 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-size: 11px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: color .15s, border-color .15s, background .15s;
            white-space: nowrap;
        }

        .topbar-btn svg {
            width: 12px;
            height: 12px;
            flex-shrink: 0;
        }

        .topbar-btn:hover {
            color: var(--fg);
            border-color: var(--fg);
            background: color-mix(in srgb, var(--fg) 6%, transparent);
        }

        .topbar-btn.danger:hover {
            color: var(--danger);
            border-color: var(--danger);
            background: color-mix(in srgb, var(--danger) 8%, transparent);
        }

        .body-area {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 180px;
            flex-shrink: 0;
            border-right: 1px solid var(--border);
            background: var(--glass-bg);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: 2px;
            padding: 12px 8px;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .sidebar::-webkit-scrollbar {
            display: none;
        }

        .sidebar-label {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            padding: 4px 8px 8px;
            opacity: .6;
        }

        .sidebar-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 10px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--muted);
            font-size: 12px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: color .15s, background .15s;
            text-align: left;
            width: 100%;
        }

        .sidebar-btn svg {
            width: 15px;
            height: 15px;
            flex-shrink: 0;
        }

        .sidebar-btn .s-badge {
            margin-left: auto;
            font-size: 9px;
            font-weight: 700;
            padding: 1px 5px;
            border-radius: 99px;
            background: var(--border);
            color: var(--muted);
            flex-shrink: 0;
        }

        .sidebar-btn:hover {
            color: var(--fg);
            background: color-mix(in srgb, var(--fg) 6%, transparent);
        }

        .sidebar-btn.active {
            color: var(--accent);
            background: color-mix(in srgb, var(--accent) 10%, transparent);
        }

        .sidebar-btn.active .s-badge {
            background: color-mix(in srgb, var(--accent) 20%, transparent);
            color: var(--accent);
        }

        .sidebar-divider {
            display: block;
            height: 0;
            border-top: 1px solid var(--border);
            margin: 4px;
            flex-shrink: 0;
            align-self: stretch;
        }

        .tab-bar {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 2px;
            padding: 0 12px;
            height: 44px;
            border-bottom: 1px solid var(--border);
            background: var(--glass-bg);
            overflow-x: auto;
            scrollbar-width: none;
            flex-shrink: 0;
        }

        .tab-bar::-webkit-scrollbar {
            display: none;
        }

        .tab-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--muted);
            font-size: 12px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            white-space: nowrap;
            transition: color .15s, background .15s;
            flex-shrink: 0;
        }

        .tab-btn svg {
            width: 13px;
            height: 13px;
        }

        .tab-btn:hover {
            color: var(--fg);
            background: color-mix(in srgb, var(--fg) 6%, transparent);
        }

        .tab-btn.active {
            color: var(--accent);
            background: color-mix(in srgb, var(--accent) 10%, transparent);
        }

        .content-area {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .tab-content {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
        }

        .tab-content.active {
            display: block;
        }

        .tab-inner {
            max-width: 1100px;
            margin: 0 auto;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 99px;
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .06em;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            color: var(--idle);
        }

        h1 {
            font-size: 15px;
            font-weight: 600;
            margin: 0 0 6px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            letter-spacing: .02em;
            text-transform: uppercase;
        }

        h1 svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .desc {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.6;
            margin: 0 0 18px;
        }

        .section-title {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: var(--muted);
            margin: 0 0 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .section-title-toggle {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: var(--muted);
            margin: 0 0 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            -webkit-user-select: none;
            user-select: none;
        }

        .toggle-line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .toggle-chevron {
            width: 11px;
            height: 11px;
            flex-shrink: 0;
            transition: transform .2s;
        }

        .toggle-chevron.open {
            transform: rotate(180deg);
        }

        .auth-area {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 14px;
        }

        .auth-input {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            background: var(--input-bg);
            color: var(--fg);
            font-size: 14px;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
            font-family: inherit;
        }

        .auth-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 15%, transparent);
        }

        .auth-input.error {
            border-color: var(--danger);
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--danger) 12%, transparent);
        }

        .auth-hint {
            font-size: 12px;
            color: var(--danger);
            min-height: 16px;
            margin: 0;
        }

        .btn-auth {
            width: 100%;
            padding: 11px 14px;
            border-radius: 10px;
            border: none;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            transition: opacity .18s, transform .12s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 4px;
        }

        .btn-auth:hover {
            opacity: .88;
            transform: translateY(-1px);
        }

        .btn-auth:active {
            opacity: .95;
            transform: translateY(0);
        }

        .btn-auth:disabled {
            opacity: .6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-auth svg {
            width: 15px;
            height: 15px;
            flex-shrink: 0;
        }

        .retry-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 4px;
        }

        .retry-msg {
            font-size: 13px;
            color: var(--muted);
            margin: 0;
            line-height: 1.6;
        }

        .hero-summary {
            padding: 14px 18px;
            background: color-mix(in srgb, var(--accent) 6%, transparent);
            border-radius: 10px;
            border: 1px solid color-mix(in srgb, var(--accent) 20%, transparent);
            border-left: 3px solid var(--accent);
            margin-bottom: 16px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .hero-summary svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
            margin-top: 2px;
            color: var(--accent);
        }

        .hero-summary-text {
            font-size: 13px;
            color: var(--fg);
            line-height: 1.7;
            flex: 1;
        }

        .hero-summary-text .hl {
            font-weight: 700;
            color: var(--accent);
        }

        .hero-summary-text .hl-ok {
            font-weight: 700;
            color: var(--success);
        }

        .hero-summary-text .hl-warn {
            font-weight: 700;
            color: var(--warning);
        }

        /* ── summary chips ── */
        .summary-chips-grid {
            display: grid;
            gap: 8px;
            margin-bottom: 14px;
        }

        .summary-chip {
            padding: 8px 10px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--glass-bg);
            display: flex;
            flex-direction: column;
            gap: 2px;
            position: relative;
            overflow: hidden;
            transition: border-color .15s, background .15s;
        }

        .summary-chip:hover {
            border-color: color-mix(in srgb, var(--accent) 30%, transparent);
            background: color-mix(in srgb, var(--accent) 4%, transparent);
        }

        .chip-icon {
            width: 15px;
            height: 15px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 3px;
            flex-shrink: 0;
        }

        .chip-icon svg {
            width: 9px;
            height: 9px;
        }

        .chip-value {
            font-size: 18px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -.02em;
        }

        .chip-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--muted);
        }

        .chip-sub {
            font-size: 10px;
            color: var(--muted);
            opacity: .7;
            margin-top: 1px;
        }

        .unlock-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 16px;
        }

        .unlock-tag {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid var(--border);
            background: var(--glass-bg);
        }

        .unlock-tag .ut-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .unlock-tag .ut-count {
            color: var(--muted);
            font-size: 10px;
        }

        /* ── 概览底部三栏 ── */
        .overview-grid-3 {
            display: grid;
            gap: 12px;
        }

        @media (max-width: 720px) {
            .overview-grid-3 {
                grid-template-columns: 1fr;
            }
        }

        @media (min-width: 721px) {
            .overview-grid-3 {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (min-width: 1101px) {
            .overview-grid-3 {
                grid-template-columns: 1fr 1fr 1fr;
            }
        }

        .stat-panel {
            padding: 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--glass-bg);
        }

        .panel-title {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .07em;
            color: var(--muted);
            margin-bottom: 12px;
        }

        .quality-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .quality-item {
            flex: 1;
            text-align: center;
            padding: 10px 4px;
            border-radius: 8px;
            background: var(--input-bg);
            border: 1px solid var(--border);
        }

        .quality-val {
            font-size: 20px;
            font-weight: 700;
        }

        .quality-label {
            font-size: 10px;
            color: var(--muted);
            margin-top: 4px;
        }

        .cf-breakdown {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .cf-group {
            display: flex;
            align-items: flex-start;
            gap: 6px;
        }

        .cf-group-title {
            flex-shrink: 0;
            width: 68px;
            font-weight: 600;
            padding-top: 2px;
            font-size: 10px;
        }

        .cf-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
        }

        .cf-tag {
            display: inline-flex;
            align-items: center;
            gap: 2px;
            padding: 1px 6px;
            border-radius: 99px;
            border: 1px solid var(--border);
            font-size: 10px;
            background: var(--glass-bg);
        }

        .cf-tag em {
            font-style: normal;
            color: var(--muted);
        }

        .nav-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            cursor: pointer;
            font-family: inherit;
            color: var(--fg);
            transition: border-color .15s, background .15s;
            text-align: left;
            width: 100%;
            margin-bottom: 6px;
        }

        .nav-card:last-child {
            margin-bottom: 0;
        }

        .nav-card:hover {
            border-color: var(--accent);
            background: color-mix(in srgb, var(--accent) 6%, transparent);
        }

        .nav-card-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-card-left svg {
            width: 13px;
            height: 13px;
            color: var(--muted);
            flex-shrink: 0;
        }

        .nav-card-label {
            font-size: 13px;
            font-weight: 600;
        }

        .nav-card-right {
            font-size: 11px;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .nav-card-right svg {
            width: 11px;
            height: 11px;
            opacity: .5;
        }

        /* ── 配置快览 status 行 ── */
        .cfg-status-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid color-mix(in srgb, var(--border) 50%, transparent);
            gap: 8px;
        }

        .cfg-status-row:last-child {
            border-bottom: none;
        }

        .cfg-status-k {
            font-size: 11px;
            color: var(--muted);
            flex-shrink: 0;
        }

        .cfg-status-v {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            font-size: 11px;
            font-weight: 600;
        }

        .cfg-status-v svg {
            width: 11px;
            height: 11px;
            flex-shrink: 0;
        }

        .cfg-status-v.ok {
            color: var(--success);
        }

        .cfg-status-v.warn {
            color: var(--warning);
        }

        .cfg-status-v.bad {
            color: var(--danger);
        }

        .cfg-status-v.muted-v {
            color: var(--muted);
        }

        /* ── 地理分布 ── */
        .geo-view {
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--glass-bg);
            overflow: hidden;
            margin-bottom: 4px;
        }

        .geo-region-bar {
            display: flex;
            height: 6px;
            border-radius: 99px;
            overflow: hidden;
            gap: 1px;
            margin-bottom: 14px;
        }

        .geo-region-seg {
            height: 100%;
            border-radius: 1px;
            transition: flex .6s cubic-bezier(.4, 0, .2, 1);
        }

        .geo-region-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 14px;
        }

        .geo-region-dot {
            width: 8px;
            height: 8px;
            border-radius: 2px;
            flex-shrink: 0;
        }

        .geo-region-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: var(--muted);
        }

        .geo-region-item strong {
            color: var(--fg);
        }

        .geo-top-list {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 14px;
        }

        .geo-top-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .geo-top-rank {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-weight: 700;
            background: var(--border);
            color: var(--muted);
            flex-shrink: 0;
        }

        .geo-top-row:nth-child(1) .geo-top-rank {
            background: color-mix(in srgb, gold 30%, transparent);
            color: #b8860b;
        }

        .geo-top-row:nth-child(2) .geo-top-rank {
            background: color-mix(in srgb, silver 30%, transparent);
            color: #64748b;
        }

        .geo-top-row:nth-child(3) .geo-top-rank {
            background: color-mix(in srgb, #cd7f32 25%, transparent);
            color: #cd7f32;
        }

        .geo-top-key {
            font-size: 12px;
            font-weight: 700;
            width: 28px;
            flex-shrink: 0;
        }

        .geo-top-bar-wrap {
            flex: 1;
            height: 8px;
            background: var(--border);
            border-radius: 99px;
            overflow: hidden;
        }

        .geo-top-bar {
            height: 100%;
            border-radius: 99px;
            transition: width .6s cubic-bezier(.4, 0, .2, 1);
        }

        .geo-top-val {
            font-size: 12px;
            font-weight: 700;
            width: 28px;
            text-align: right;
            flex-shrink: 0;
        }

        .geo-top-pct {
            font-size: 10px;
            color: var(--muted);
            width: 34px;
            text-align: right;
            flex-shrink: 0;
        }

        .geo-all-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
        }

        @media (max-width: 540px) {
            .geo-all-grid {
                grid-template-columns: 1fr;
            }
        }

        .geo-all-col {
            padding: 10px 14px;
        }

        .geo-all-col+.geo-all-col {
            border-left: 1px solid var(--border);
        }

        @media (max-width: 540px) {
            .geo-all-col+.geo-all-col {
                border-left: none;
                border-top: 1px solid var(--border);
            }
        }

        .geo-all-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
        }

        .geo-all-key {
            font-size: 10px;
            font-weight: 600;
            width: 24px;
            flex-shrink: 0;
            color: var(--muted);
        }

        .geo-all-bar-wrap {
            flex: 1;
            height: 4px;
            background: var(--border);
            border-radius: 99px;
            overflow: hidden;
        }

        .geo-all-bar {
            height: 100%;
            border-radius: 99px;
        }

        .geo-all-val {
            font-size: 10px;
            color: var(--fg);
            font-weight: 600;
            width: 22px;
            text-align: right;
            flex-shrink: 0;
        }

        .geo-all-pct {
            font-size: 9px;
            color: var(--muted);
            width: 28px;
            text-align: right;
            flex-shrink: 0;
        }

        .geo-section-title {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: var(--muted);
            padding: 10px 14px 4px;
            opacity: .6;
        }

        .geo-summary {
            display: flex;
            gap: 16px;
            padding: 10px 16px;
            border-top: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .geo-summary-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: var(--muted);
        }

        .geo-summary-item strong {
            color: var(--fg);
            font-weight: 700;
        }

        /* ── 飞行地图容器 ── */
        .map-slot {
            display: none;
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 6;
            min-height: 180px;
            max-height: 420px;
            overflow: hidden;
            background: #060d1a;
            border-bottom: 1px dashed color-mix(in srgb, var(--border) 60%, transparent);
        }

        .map-slot canvas {
            display: block;
        }

        .map-slot-hint {
            text-align: center;
            opacity: .35;
            padding: 20px;
        }

        .map-slot-hint svg {
            width: 28px;
            height: 28px;
            margin: 0 auto 6px;
            display: block;
        }

        .map-slot-hint span {
            font-size: 11px;
            color: var(--muted);
        }

        .map-overlay-legend {
            position: absolute;
            bottom: 8px;
            right: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            max-width: 400px;
            justify-content: flex-end;
            pointer-events: none;
        }

        .map-overlay-item {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            font-size: 9px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.65);
            background: rgba(0, 0, 0, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            padding: 2px 6px;
            letter-spacing: .04em;
        }

        .map-overlay-dot {
            width: 6px;
            height: 6px;
            border-radius: 2px;
            flex-shrink: 0;
        }

        .map-origin-hint {
            position: absolute;
            bottom: 7px;
            left: 10px;
            font-size: 9px;
            color: rgba(255, 255, 255, 0.35);
            pointer-events: none;
        }

        @media (max-width: 720px) {
            .map-origin-hint {
                display: none;
            }
        }

        /* ── 协议分析 ── */
        .proto-stat-row {
            display: flex;
            gap: 20px;
            padding: 10px 16px;
            border-radius: 8px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        .proto-stat-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .proto-stat-val {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -.02em;
            color: var(--fg);
            line-height: 1;
        }

        .proto-stat-label {
            font-size: 10px;
            color: var(--muted);
        }

        .proto-donut-wrap {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 14px 16px;
            background: var(--glass-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 14px;
        }

        .proto-donut-svg {
            flex-shrink: 0;
        }

        .proto-donut-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 0;
        }

        .proto-donut-row {
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .proto-donut-dot {
            width: 8px;
            height: 8px;
            border-radius: 2px;
            flex-shrink: 0;
        }

        .proto-donut-name {
            font-size: 11px;
            font-weight: 700;
            flex-shrink: 0;
            width: 68px;
        }

        .proto-donut-bar-wrap {
            flex: 1;
            height: 5px;
            background: var(--border);
            border-radius: 99px;
            overflow: hidden;
        }

        .proto-donut-bar {
            height: 100%;
            border-radius: 99px;
            transition: width .6s cubic-bezier(.4, 0, .2, 1);
        }

        .proto-donut-val {
            font-size: 11px;
            font-weight: 700;
            width: 28px;
            text-align: right;
            flex-shrink: 0;
        }

        .proto-donut-pct {
            font-size: 10px;
            color: var(--muted);
            width: 30px;
            text-align: right;
            flex-shrink: 0;
        }

        @media (max-width: 540px) {
            .proto-donut-wrap {
                flex-direction: column;
                align-items: flex-start;
            }

            .proto-donut-svg {
                display: none;
            }
        }

        .proto-summary-bar {
            display: flex;
            height: 8px;
            border-radius: 99px;
            overflow: hidden;
            gap: 1px;
            margin-bottom: 16px;
        }

        .proto-summary-seg {
            height: 100%;
            border-radius: 1px;
        }

        .proto-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .proto-card {
            padding: 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--glass-bg);
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: border-color .15s, transform .15s;
        }

        .proto-card:hover {
            border-color: var(--proto-color, var(--accent));
            transform: translateY(-1px);
        }

        .proto-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .proto-card-name {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .04em;
        }

        .proto-card-count {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -.02em;
        }

        .proto-card-bar-wrap {
            height: 4px;
            background: var(--border);
            border-radius: 99px;
            overflow: hidden;
        }

        .proto-card-bar {
            height: 100%;
            border-radius: 99px;
            background: var(--proto-color, var(--accent));
            transition: width .6s cubic-bezier(.4, 0, .2, 1);
        }

        .proto-card-pct {
            font-size: 10px;
            color: var(--muted);
            font-weight: 600;
        }

        .proto-vless {
            --proto-color: #0ea5a0
        }

        .proto-vmess {
            --proto-color: #d97706
        }

        .proto-trojan {
            --proto-color: #7c3aed
        }

        .proto-ss {
            --proto-color: #2563eb
        }

        .proto-ssr {
            --proto-color: #1d4ed8
        }

        .proto-http {
            --proto-color: #059669
        }

        .proto-socks5 {
            --proto-color: #64748b
        }

        .proto-hysteria {
            --proto-color: #db2777
        }

        .proto-hy2 {
            --proto-color: #be185d
        }

        .proto-tuic {
            --proto-color: #0891b2
        }


        /* ── 订阅排名 ── */
        .copy-toolbar {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 9px 12px;
            margin-bottom: 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--glass-bg);
            flex-wrap: nowrap;
            overflow: hidden;
        }

        .copy-toolbar-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--muted);
            flex-shrink: 0;
            white-space: nowrap;
        }

        @media (max-width: 480px) {
            .copy-toolbar-label {
                display: none;
            }
        }

        .copy-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            border-radius: 7px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--fg);
            font-size: 11px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: color .15s, border-color .15s, background .15s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .copy-btn svg {
            width: 11px;
            height: 11px;
            flex-shrink: 0;
        }

        .copy-btn:hover {
            color: var(--accent);
            border-color: var(--accent);
            background: color-mix(in srgb, var(--accent) 8%, transparent);
        }

        .copy-btn.copied {
            color: var(--success);
            border-color: var(--success);
            background: color-mix(in srgb, var(--success) 8%, transparent);
        }

        .copy-scope {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: var(--muted);
            flex-shrink: 0;
            white-space: nowrap;
        }

        .copy-scope label {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }

        .sub-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sub-item {
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--glass-bg);
            transition: background .15s;
        }

        .sub-item:hover {
            background: var(--input-bg);
        }

        .sub-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            min-width: 0;
        }

        .sub-rank {
            flex-shrink: 0;
            width: 18px;
            height: 18px;
            border-radius: 4px;
            background: var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-weight: 700;
            color: var(--muted);
        }

        .sub-item:nth-child(1) .sub-rank {
            background: color-mix(in srgb, gold 30%, transparent);
            color: #b8860b;
        }

        .sub-item:nth-child(2) .sub-rank {
            background: color-mix(in srgb, silver 30%, transparent);
            color: #64748b;
        }

        .sub-item:nth-child(3) .sub-rank {
            background: color-mix(in srgb, #cd7f32 25%, transparent);
            color: #cd7f32;
        }

        .sub-url {
            flex: 1;
            font-size: 11px;
            font-family: var(--font-mono, monospace);
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
        }

        .sub-rate {
            font-size: 13px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .sub-bar-wrap {
            height: 4px;
            background: var(--border);
            border-radius: 99px;
            overflow: hidden;
            margin-bottom: 6px;
        }

        .sub-bar {
            height: 100%;
            border-radius: 99px;
            transition: width .5s ease;
        }

        .sub-meta {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 5px;
            font-size: 11px;
            color: var(--muted);
        }

        .tag-pill {
            padding: 1px 6px;
            border-radius: 4px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            font-size: 10px;
            white-space: nowrap;
        }

        .sub-tier {
            display: inline-flex;
            align-items: center;
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .05em;
            flex-shrink: 0;
        }

        .sub-tier.tier-s {
            background: color-mix(in srgb, #10b981 14%, transparent);
            color: #10b981;
        }

        .sub-tier.tier-a {
            background: color-mix(in srgb, var(--success) 14%, transparent);
            color: var(--success);
        }

        .sub-tier.tier-b {
            background: color-mix(in srgb, var(--warning) 14%, transparent);
            color: var(--warning);
        }

        .sub-tier.tier-c {
            background: color-mix(in srgb, var(--danger) 12%, transparent);
            color: var(--danger);
        }

        .bad-list {
            border-radius: 10px;
            border: 1px solid var(--border);
            overflow: hidden;
            background: var(--glass-bg);
        }

        .bad-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            gap: 8px;
        }

        .bad-item:last-child {
            border-bottom: none;
        }

        .bad-url {
            font-size: 11px;
            font-family: var(--font-mono, monospace);
            color: var(--muted);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            min-width: 0;
        }

        .bad-count {
            font-size: 11px;
            color: var(--muted);
            flex-shrink: 0;
        }

        /* ── 配置分析 ── */
        .cfg-analysis-grid {
            display: grid;
            gap: 12px;
            margin-bottom: 16px;
            grid-template-columns: 1fr;
        }

        @media (min-width: 721px) {
            .cfg-analysis-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (min-width: 1101px) {
            .cfg-analysis-grid {
                grid-template-columns: 1fr 1.45fr 1fr 1fr;
            }
        }

        .cfg-card {
            padding: 14px 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--glass-bg);
        }

        .cfg-card-title {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .07em;
            color: var(--muted);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .cfg-card-title svg {
            width: 12px;
            height: 12px;
            flex-shrink: 0;
        }

        .cfg-kv {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid color-mix(in srgb, var(--border) 50%, transparent);
            gap: 8px;
        }

        .cfg-kv:last-child {
            border-bottom: none;
        }

        .cfg-k {
            font-size: 12px;
            color: var(--muted);
            flex-shrink: 0;
            white-space: nowrap;
        }

        .cfg-v {
            font-size: 12px;
            font-weight: 600;
            color: var(--fg);
            text-align: right;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            max-width: 55%;
        }

        .cfg-v.ok {
            color: var(--success);
        }

        .cfg-v.warn {
            color: var(--warning);
        }

        .cfg-v.bad {
            color: var(--danger);
        }

        .cfg-bottom-grid {
            display: grid;
            gap: 16px;
            align-items: start;
            margin-top: 8px;
        }

        .deploy-cards-col {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .deploy-card {
            padding: 14px 15px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--glass-bg);
        }

        .deploy-card-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--fg);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .deploy-card-title svg {
            width: 12px;
            height: 12px;
            flex-shrink: 0;
            color: var(--warning);
        }

        .deploy-card-desc {
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 10px;
            line-height: 1.6;
        }

        .deploy-card-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .deploy-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            border-radius: 7px;
            border: 1px solid var(--border);
            font-size: 11px;
            font-weight: 600;
            color: var(--fg);
            text-decoration: none;
            background: var(--input-bg);
            transition: border-color .15s, color .15s, background .15s;
        }

        .deploy-badge svg {
            width: 11px;
            height: 11px;
            flex-shrink: 0;
        }

        .deploy-badge:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: color-mix(in srgb, var(--accent) 8%, transparent);
        }

        .deploy-badge.primary {
            border-color: var(--accent);
            color: var(--accent);
            background: color-mix(in srgb, var(--accent) 8%, transparent);
        }

        .deploy-badge.primary:hover {
            background: color-mix(in srgb, var(--accent) 15%, transparent);
        }

        .suggest-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .suggest-item {
            display: flex;
            gap: 8px;
            align-items: flex-start;
            padding: 8px 10px;
            border-radius: 8px;
            font-size: 12px;
            line-height: 1.5;
            border: 1px solid transparent;
        }

        .suggest-item svg {
            width: 13px;
            height: 13px;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .suggest-item.info {
            background: color-mix(in srgb, var(--accent) 8%, transparent);
            border-color: color-mix(in srgb, var(--accent) 20%, transparent);
        }

        .suggest-item.warn {
            background: color-mix(in srgb, var(--warning) 8%, transparent);
            border-color: color-mix(in srgb, var(--warning) 20%, transparent);
        }

        .suggest-item.good {
            background: color-mix(in srgb, var(--success) 8%, transparent);
            border-color: color-mix(in srgb, var(--success) 20%, transparent);
        }

        .suggest-item.info svg {
            color: var(--accent);
        }

        .suggest-item.warn svg {
            color: var(--warning);
        }

        .suggest-item.good svg {
            color: var(--success);
        }

        /* 建议项末尾「去配置」跳转链接 */
        .suggest-item-body {
            flex: 1;
            min-width: 0;
        }

        .suggest-action {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            margin-top: 4px;
            font-size: 10px;
            font-weight: 700;
            text-decoration: none;
            opacity: .75;
            border-radius: 4px;
            padding: 1px 5px;
            border: 1px solid currentColor;
            white-space: nowrap;
            transition: opacity .15s;
            color: var(--idle);
        }

        .suggest-action:hover {
            opacity: 1;
        }

        .suggest-action svg {
            width: 10px;
            height: 10px;
        }

        /* ── 其他 ── */
        .loading-dots::after {
            content: '';
            animation: dots 1.2s steps(4, end) infinite;
        }

        @keyframes dots {
            0% {
                content: ''
            }

            25% {
                content: '.'
            }

            50% {
                content: '..'
            }

            75% {
                content: '...'
            }
        }

        .page-footer {
            padding: 10px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            background: var(--glass-bg);
            flex-shrink: 0;
        }

        .footer-icons {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .footer-icon {
            width: 15px;
            height: 15px;
            opacity: .6;
            transition: opacity .15s;
            display: block;
            filter: invert(var(--invert));
        }

        .footer-icons a:hover .footer-icon {
            opacity: .75;
        }

        .footer-copy {
            font-size: 11px;
            color: var(--muted);
        }

        .footer-copy a {
            color: var(--muted);
            text-decoration: none;
        }

        .footer-copy a:hover {
            color: var(--accent);
        }

        code {
            font-family: var(--font-mono, monospace);
            background: var(--placehoder-bg, rgba(0, 0, 0, .06));
            color: var(--danger);
            padding: 1px 5px;
            border-radius: 4px;
            font-size: 11px;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @media (max-width: 720px) {
            .auth-input {
                /* 移动设备保证 16px 以避免 iOS 放大 */
                font-size: 16px;
            }

            .sidebar {
                display: none;
            }

            .tab-bar {
                display: flex;
            }

            .topbar-meta {
                display: none;
            }

            .tab-btn span {
                display: none;
            }

            .tab-content {
                padding: 12px;
            }

            .summary-chips-grid {
                grid-template-columns: repeat(2, 1fr) !important;
            }

            .proto-grid {
                grid-template-columns: 1fr !important;
            }

            .cfg-bottom-grid {
                grid-template-columns: 1fr !important;
            }

            /* .copy-btn .btn-text {
                display: none;
            } */

            .copy-btn {
                padding: 6px 8px;
            }
        }

        @media (min-width: 721px) and (max-width: 1100px) {
            .summary-chips-grid {
                grid-template-columns: repeat(3, 1fr);
            }

            .cfg-bottom-grid {
                grid-template-columns: 260px 1fr;

        function hexToRgba(hex, a) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r},${g},${b},${a})`;
        }

        function loadScript(src) {
            return new Promise((res, rej) => {
                if (document.querySelector(`script[src="${src}"]`)) return res();
                const s = document.createElement('script');
                s.src = src; s.onload = res; s.onerror = rej;
                document.head.appendChild(s);
            });
        }

        class GeoFlightMap {
            constructor(container, entries, origin) {
                this.container = container;
                this.origin = origin;
                this.entries = entries.filter(([c]) => GEO_COUNTRY_COORDS[c]);
                this.dpr = Math.min(window.devicePixelRatio || 1, 2);
                this.maxCount = this.entries[0]?.[1] || 1;
                this.raf = null;
                this.t0 = null;
                this.W = this.H = 0;

                this.canvas = document.createElement('canvas');
                this.canvas.style.cssText = 'display:block;width:100%;height:100%;';
                this.ctx = this.canvas.getContext('2d');
                container.innerHTML = '';
                container.appendChild(this.canvas);

                this._addLegend(container);
                this._addOriginHint(container);

                this.resize();
                this.buildArcs();
                this._worldReady = false;
                this._loadWorld().then(() => { this.t0 = null; });
                this._startAnim();

                this._ro = new ResizeObserver(() => { this.resize(); this.buildArcs(); this.t0 = null; });
                this._ro.observe(container);
            }

            // 图例 & 提示 overlay
            _addLegend(container) {
                const visibleRegions = new Set(this.entries.map(([c]) => GEO_REGIONS[c] || '其他'));
                const html = [...visibleRegions].map(r =>
                    `<div class="map-overlay-item"><span class="map-overlay-dot" style="background:${REGION_COLORS[r] || '#64748b'}"></span>${r}</div>`
                ).join('');
                const div = document.createElement('div');
                div.className = 'map-overlay-legend';
                div.innerHTML = html;
                container.appendChild(div);
            }

            _addOriginHint(container) {
                const div = document.createElement('div');
                div.className = 'map-origin-hint';
                div.id = 'mapOriginHint';
                div.textContent = '● 当前位置';
                container.appendChild(div);
            }

            resize() {
                const W = this.container.clientWidth || 640;
                const H = this.container.clientHeight || 240;
                this.W = W; this.H = H;
                this.canvas.width = W * this.dpr;
                this.canvas.height = H * this.dpr;
                this.canvas.style.width = W + 'px';
                this.canvas.style.height = H + 'px';
                this.ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);
                this._initScale();
            }

            _initScale() {
                // 以 900×260 为基准尺寸，等比缩放所有视觉元素
                const base = Math.sqrt(900 * 260);
                const cur = Math.sqrt(this.W * this.H);
                this.scale = Math.max(0.45, Math.min(1.8, cur / base));
                // 移动端降低 DPR 渲染压力
                this.isMobile = this.W < 520;
            }

            proj(lon, lat) {
                const mx = 2, my = 4;
                let dlon = lon - this.origin.lon;
                while (dlon > 180) dlon -= 360;
                while (dlon < -180) dlon += 360;
                // 原点居中，±180° 精确到画布两侧
                const x = mx + (dlon + 180) / 360 * (this.W - 2 * mx);
                // 纬度范围 85°N ~ 60°S（145° 总跨度，裁掉极地空洞）
                const y = my + (85 - lat) / 145 * (this.H - 2 * my);
                return [x, y];
            }

            _projRaw(dlon, lat) {
                const mx = 2, my = 4;
                const x = mx + (dlon + 180) / 360 * (this.W - 2 * mx);
                const y = my + (85 - lat) / 145 * (this.H - 2 * my);
                return [x, y];
            }

            // 建弧线数据
            buildArcs() {
                const [ox, oy] = this.proj(this.origin.lon, this.origin.lat);
                this.ox = ox; this.oy = oy;
                const sc = this.scale || 1;

                this.arcs = this.entries.map(([code, count], i) => {
                    const [lon, lat] = GEO_COUNTRY_COORDS[code];
                    const [dx, dy] = this.proj(lon, lat);
                    const region = GEO_REGIONS[code] || '其他';
                    const color = REGION_COLORS[region] || '#64748b';
                    const ratio = count / this.maxCount;
                    const dist = Math.hypot(dx - ox, dy - oy);
                    const lift = Math.min(dist * 0.42, this.H * 0.45);
                    const lineW = (0.5 + ratio * 1.8) * sc;
                    const planeSize = (3 + ratio * 3) * sc;
                    const speedFactor = this.isMobile ? 1.25 : 1;
                    return {
                        code, count, ratio, color,
                        x1: ox, y1: oy,
                        cpx: (ox + dx) / 2, cpy: (oy + dy) / 2 - lift,
                        x2: dx, y2: dy,
                        lineW, planeSize,
                        delay: i * (this.isMobile ? 90 : 60),
                        drawDur: (700 + (1 - ratio) * 400) * speedFactor,
                        period: (3000 + i * 120) * speedFactor,
                    };
                });
            }

            bzPt(t, x1, y1, cpx, cpy, x2, y2) {
                const m = 1 - t;
                return [m * m * x1 + 2 * m * t * cpx + t * t * x2, m * m * y1 + 2 * m * t * cpy + t * t * y2];
            }

            bzAngle(t, x1, y1, cpx, cpy, x2, y2) {
                const m = 1 - t;
                return Math.atan2(2 * m * (cpy - y1) + 2 * t * (y2 - cpy), 2 * m * (cpx - x1) + 2 * t * (x2 - cpx));
            }

            // 异步加载真实地图数据
            async _loadWorld() {
                if (GeoFlightMap._worldGeo) { this._worldReady = true; return; }
                if (GeoFlightMap._worldLoading) {
                    await new Promise(res => {
                        const t = setInterval(() => {
                            if (GeoFlightMap._worldGeo || !GeoFlightMap._worldLoading) { clearInterval(t); res(); }
                        }, 100);
                    });
                    this._worldReady = !!GeoFlightMap._worldGeo;
                    return;
                }
                GeoFlightMap._worldLoading = true;
                try {
                    await loadScript('https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js');
                    const resp = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
                    const topo = await resp.json();
                    GeoFlightMap._worldGeo = window.topojson.feature(topo, topo.objects.land);
                    GeoFlightMap._worldLoading = false;
                    this._worldReady = true;
                } catch (e) {
                    console.warn('[GeoFlightMap] 地图数据加载失败，回退点阵模式', e);
                    GeoFlightMap._worldLoading = false;
                    this._worldReady = false;
                }
            }

            drawWorldMap() {
                if (!this._worldReady || !GeoFlightMap._worldGeo) { this._drawDotFallback(); return; }
                const { ctx } = this;
                ctx.save();
                ctx.beginPath();
                ctx.rect(0, 0, this.W, this.H);
                ctx.clip();
                const geo = GeoFlightMap._worldGeo;
                const features = geo.type === 'FeatureCollection' ? geo.features
                    : geo.type === 'Feature' ? [geo]
                        : [{ geometry: geo }];
                for (const f of features) { if (f.geometry) this._drawGeometry(f.geometry); }
                ctx.restore();
            }

            _drawGeometry(geometry) {
                if (!geometry) return;
                if (geometry.type === 'Polygon') {
                    this._drawRings(geometry.coordinates);
                } else if (geometry.type === 'MultiPolygon') {
                    for (const poly of geometry.coordinates) this._drawRings(poly);
                } else if (geometry.type === 'GeometryCollection') {
                    for (const g of geometry.geometries) this._drawGeometry(g);
                }
            }

            _drawRings(rings) {
                const { ctx } = this;
                ctx.beginPath();
                for (const ring of rings) {
                    if (ring.length < 3) continue;
                    let prevLonRaw = null, curDlon = 0;
                    for (let i = 0; i < ring.length; i++) {
                        const [lon, lat] = ring[i];
                        if (i === 0) {
                            curDlon = lon - this.origin.lon;
                            while (curDlon > 180) curDlon -= 360;
                            while (curDlon < -180) curDlon += 360;
                        } else {
                            let step = lon - prevLonRaw;
                            while (step > 180) step -= 360;
                            while (step < -180) step += 360;
                            curDlon += step;
                        }
                        prevLonRaw = lon;
                        const [px, py] = this._projRaw(curDlon, lat);
                        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
                    }
                    ctx.closePath();
                }
                ctx.fillStyle = 'rgba(18, 52, 100, 0.60)';
                ctx.fill('evenodd');
                ctx.strokeStyle = 'rgba(70, 140, 220, 0.38)';
                ctx.lineWidth = 0.5;
                ctx.lineJoin = 'round';
                ctx.stroke();
            }

            _drawDotFallback() {
                const { ctx } = this;
                const destSet = new Set(this.entries.map(([c]) => c));
                // ctx.fillStyle = 'rgba(255,255,255,0.08)';
                for (const [code, [lon, lat]] of Object.entries(GEO_COUNTRY_COORDS)) {
                    let d = lon - this.origin.lon;
                    while (d > 180) d -= 360;
                    while (d < -180) d += 360;
                    const [x, y] = this.proj(this.origin.lon + d, lat);
                    ctx.beginPath();
                    ctx.arc(x, y, destSet.has(code) ? 1.5 : 0.8, 0, Math.PI * 2);
                    ctx.fillStyle = destSet.has(code) ? 'rgba(255,248,180,0.5)' : 'rgba(255,255,255,0.07)';
                    ctx.fill();
                }
            }

            // 背景
            drawBg() {
                const { ctx, W, H } = this;
                const grad = ctx.createLinearGradient(0, 0, 0, H);
                grad.addColorStop(0, '#04091a');
                grad.addColorStop(1, '#070d22');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, W, H);

                ctx.save();
                ctx.strokeStyle = 'rgba(255,255,255,0.035)';
                ctx.lineWidth = 0.5;
                for (let d = -180; d <= 180; d += 30) {
                    const lon = this.origin.lon + d;
                    const [x, y1] = this.proj(lon, 85);
                    const [, y2] = this.proj(lon, -60);
                    ctx.beginPath(); ctx.moveTo(x, y1); ctx.lineTo(x, y2); ctx.stroke();
                }
                for (let lat = -60; lat <= 85; lat += 30) {
                    const [x1, y] = this.proj(this.origin.lon - 180, lat);
                    const [x2] = this.proj(this.origin.lon + 180, lat);
                    ctx.beginPath(); ctx.moveTo(x1, y); ctx.lineTo(x2, y); ctx.stroke();
                }
                ctx.restore();

                // 大陆轮廓
                this.drawWorldMap();


                // 城市灯光
                const destSet = new Set(this.entries.map(([c]) => c));
                for (const [code, [lon, lat]] of Object.entries(GEO_COUNTRY_COORDS)) {
                    let d = lon - this.origin.lon;
                    while (d > 180) d -= 360;
                    while (d < -180) d += 360;
                    const [x, y] = this.proj(this.origin.lon + d, lat);
                    const isDest = destSet.has(code);
                    ctx.beginPath();
                    ctx.arc(x, y, isDest ? 1.6 : 0.7, 0, Math.PI * 2);
                    ctx.fillStyle = isDest ? 'rgba(255,248,180,0.6)' : 'rgba(255,255,255,0.06)';
                    ctx.fill();
                }
            }

            // 弧线
            drawArc(arc, progress) {
                if (progress <= 0) return;
                const { ctx } = this;
                const { x1, y1, cpx, cpy, x2, y2, color, ratio, lineW } = arc;
                const sc = this.scale || 1;
                const STEPS = this.isMobile ? 40 : 64;
                const end = Math.ceil(progress * STEPS);

                ctx.save();
                ctx.shadowColor = color;
                ctx.shadowBlur = (3 + ratio * 8) * sc;
                ctx.strokeStyle = hexToRgba(color, 0.18 + ratio * 0.52);
                ctx.lineWidth = lineW;
                ctx.lineCap = 'round';
                ctx.beginPath();
                for (let i = 0; i <= end; i++) {
                    const s = (i / end) * progress;
                    const mt = 1 - s;
                    const px = mt * mt * x1 + 2 * mt * s * cpx + s * s * x2;
                    const py = mt * mt * y1 + 2 * mt * s * cpy + s * s * y2;
                    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
                }
                ctx.stroke();
                // 外发光宽线
                ctx.shadowBlur = 0;
                ctx.strokeStyle = hexToRgba(color, 0.05 + ratio * 0.08);
                ctx.lineWidth = lineW * 3.5;
                ctx.stroke();
                ctx.restore();
            }

            // 飞机图标
            drawPlane(arc, progress, now) {
                if (progress < 1) return;
                const { ctx } = this;
                const { x1, y1, cpx, cpy, x2, y2, color, ratio, period, planeSize } = arc;
                const t = (now % period) / period;
                const [px, py] = this.bzPt(t, x1, y1, cpx, cpy, x2, y2);
                const angle = this.bzAngle(t, x1, y1, cpx, cpy, x2, y2);
                const sz = planeSize;

                ctx.save();
                ctx.translate(px, py);
                ctx.rotate(angle);
                ctx.shadowColor = color;
                ctx.shadowBlur = 8 * (this.scale || 1);
                ctx.globalAlpha = 0.85 + ratio * 0.15;

                // 机身
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.moveTo(sz * 1.4, 0);
                ctx.lineTo(-sz * 0.8, -sz * 0.45);
                ctx.lineTo(-sz * 0.3, 0);
                ctx.lineTo(-sz * 0.8, sz * 0.45);
                ctx.closePath();
                ctx.fill();

                // 机翼彩色高光
                ctx.fillStyle = hexToRgba(color, 0.7);
                ctx.beginPath();
                ctx.moveTo(-sz * 0.1, -sz * 0.1);
                ctx.lineTo(-sz * 0.7, -sz * 0.9);
                ctx.lineTo(-sz * 1.0, -sz * 0.4);
                ctx.lineTo(-sz * 0.5, 0);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }

            // 目的地光点
            drawDest(arc, progress, now) {
                if (progress < 0.75) return;
                const alpha = Math.min(1, (progress - 0.75) / 0.25);
                const { ctx } = this;
                const { x2, y2, color, ratio, code } = arc;
                const sc = this.scale || 1;
                const r = (2 + ratio * 4) * sc;
                const pulse = 0.4 + 0.6 * Math.sin(now * 0.003 + arc.x2 * 0.1);

                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.beginPath();
                ctx.arc(x2, y2, r + (2 + pulse * 4) * sc, 0, Math.PI * 2);
                ctx.strokeStyle = hexToRgba(color, 0.15 + pulse * 0.15);
                ctx.lineWidth = 0.7 * sc;
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(x2, y2, r + sc, 0, Math.PI * 2);
                ctx.strokeStyle = hexToRgba(color, 0.45);
                ctx.lineWidth = sc;
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(x2, y2, r, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.shadowColor = color;
                ctx.shadowBlur = (10 + ratio * 8) * sc;
                ctx.fill();

                // 标签只在宽屏且比例足够大时显示
                if (ratio > 0.25 && !this.isMobile) {
                    const fs = Math.round((8 + ratio * 4) * sc);
                    ctx.font = `700 ${fs}px system-ui,sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'bottom';
                    ctx.shadowBlur = 4;
                    ctx.shadowColor = 'rgba(0,0,0,0.9)';
                    ctx.fillStyle = 'rgba(255,255,255,0.92)';
                    ctx.fillText(code, x2, y2 - r - 3 * sc);
                }
                ctx.restore();
            }

            // 出发地
            drawOrigin(now) {
                const { ctx, ox, oy } = this;
                const sc = this.scale || 1;
                const pulse = 0.5 + 0.5 * Math.sin(now * 0.004);
                ctx.save();
                for (const [radius, alpha] of [
                    [(16 + pulse * 8) * sc, 0.06],
                    [10 * sc, 0.15],
                    [6 * sc, 0.3],
                ]) {
                    ctx.beginPath();
                    ctx.arc(ox, oy, radius, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
                    ctx.lineWidth = sc;
                    ctx.stroke();
                }
                ctx.beginPath();
                ctx.arc(ox, oy, 3.5 * sc, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.shadowColor = '#fff';
                ctx.shadowBlur = 14 * sc;
                ctx.fill();
                ctx.restore();
            }

            // 主渲染循环
            draw(now) {
                // tab 不可见时跳过渲染节省性能
                if (!document.getElementById('tab-geo')?.classList.contains('active')) {
                    this.raf = requestAnimationFrame(t => this.draw(t));
                    return;
                }
                if (!this.t0) this.t0 = now;
                const elapsed = now - this.t0;
                const { ctx, W, H } = this;
                ctx.clearRect(0, 0, W, H);
                this.drawBg();
                this.drawOrigin(now);
                for (const arc of this.arcs) {
                    const dt = elapsed - arc.delay;
                    arc._prog = dt <= 0 ? 0 : Math.min(1, dt / arc.drawDur);
                    this.drawArc(arc, arc._prog);
                    this.drawDest(arc, arc._prog, now);
                }
                for (const arc of this.arcs) { this.drawPlane(arc, arc._prog, now); }
                this.raf = requestAnimationFrame(t => this.draw(t));
            }

            _startAnim() { this.raf = requestAnimationFrame(t => this.draw(t)); }

            destroy() {
                if (this.raf) cancelAnimationFrame(this.raf);
                if (this._ro) this._ro.disconnect();
            }
        }

        // 根据时区推测出发地
        function guessOrigin() {
            const offset = -new Date().getTimezoneOffset() / 60;
            if (offset >= 8) return { lon: 116.4, lat: 39.9 };  // 中国
            if (offset >= 5) return { lon: 80.0, lat: 20.0 };  // 南亚
            if (offset >= 3) return { lon: 45.0, lat: 35.0 };  // 中东
            if (offset >= 0) return { lon: 10.0, lat: 51.0 };  // 西欧
            if (offset >= -5) return { lon: -74.0, lat: 40.7 };// 美东
            return { lon: -118.2, lat: 34.0 };                 // 美西
        }

        });

        const STORAGE_KEY = 'subscheck_api_key';
        function getKey() { try { return localStorage.getItem(STORAGE_KEY) || sessionStorage.getItem(STORAGE_KEY) || null; } catch { return null; } }

        async function sfetch(url, opts = {}) {
            const key = getKey();
            if (!key) return { ok: false, status: 401, error: '未认证' };
            opts.headers = { ...opts.headers, 'X-API-Key': key };
            try {
                const r = await fetch(url, opts);
                const ct = r.headers.get('content-type') || '';
                const text = await r.text();
                const payload = ct.includes('application/json') ? JSON.parse(text) : text;
                if (r.status === 401) { try { localStorage.removeItem(STORAGE_KEY); } catch { } showLoginArea('API 密钥已失效，请重新输入。'); return { ok: false, status: 401, payload }; }
                return r.ok ? { ok: true, status: r.status, payload } : { ok: false, status: r.status, payload };
            } catch (e) { return { ok: false, error: e.message }; }
        }

        function showScene(n) { document.getElementById('loginScene').style.display = n === 'login' ? 'flex' : 'none'; document.getElementById('reportScene').style.display = n === 'report' ? 'flex' : 'none'; }
        function showLoading() { showScene('login'); _setBadge('Analysis Report'); document.getElementById('placeholderMsg').style.display = ''; document.getElementById('inlineLoginArea').style.display = 'none'; document.getElementById('retryArea').style.display = 'none'; }
        function showLoginArea(hint = '') {
            showScene('login'); _setBadge('Auth Required');
            document.getElementById('placeholderMsg').style.display = 'none'; document.getElementById('inlineLoginArea').style.display = ''; document.getElementById('retryArea').style.display = 'none';
            const input = document.getElementById('inlineApiKey'), hintEl = document.getElementById('loginHint');
            if (hint) { input.classList.add('error'); hintEl.textContent = hint; } else { input.classList.remove('error'); hintEl.textContent = ''; input.placeholder = '输入 API 密钥...'; }
            setTimeout(() => input.focus(), 50);
        }
        function showRetryArea(msg, badge = 'Error') { showScene('login'); _setBadge(badge); document.getElementById('placeholderMsg').style.display = 'none'; document.getElementById('inlineLoginArea').style.display = 'none'; document.getElementById('retryArea').style.display = ''; document.getElementById('retryMsg').textContent = msg; }

        function switchTab(name) {

        async function inlineLogin() {
            const input = document.getElementById('inlineApiKey'), btn = document.getElementById('inlineLoginBtn'), hintEl = document.getElementById('loginHint');
            const k = input?.value?.trim();
            input.classList.remove('error'); hintEl.textContent = '';
            if (!k) { input.classList.add('error'); hintEl.textContent = '请输入 API 密钥'; input.focus(); return; }
            btn.disabled = true;
            try {
                const resp = await fetch('/api/status', { headers: { 'X-API-Key': k } });
                if (resp.status === 401) { input.classList.add('error'); hintEl.textContent = 'API 密钥无效，请重试'; input.value = ''; input.focus(); return; }
                if (!resp.ok) { showRetryArea(`验证失败（HTTP ${resp.status}），请检查服务状态。`); return; }
                try { localStorage.setItem(STORAGE_KEY, k); } catch { }
                await loadReport();
            } catch (e) { showRetryArea(`网络错误：${e.message}`); }
            finally { btn.disabled = false; }
        }

        async function loadReport() {
            showLoading();
            const [reportResult, cfgResult] = await Promise.all([sfetch('/api/analysis-report'), sfetch('/api/config')]);
            if (!reportResult.ok) { if (reportResult.status !== 401) showRetryArea(`加载失败（HTTP ${reportResult.status}），请检查服务是否正常。`); return; }
            if (!reportResult.payload?.report) { showRetryArea('尚未生成检测报告，请先在主界面运行一次节点检测。', 'No Data'); return; }
            try {
                const report = YAML.parse(reportResult.payload.report);
                let cfg = {};
                if (cfgResult.ok) {
                    try {
                        const rawCfg = typeof cfgResult.payload?.content === 'string'
                            ? cfgResult.payload.content
                            : (typeof cfgResult.payload === 'string' ? cfgResult.payload : '');
                        if (rawCfg) cfg = YAML.parse(rawCfg) || {};
                    } catch (e) { console.warn('config parse failed:', e); }
                }
                renderReport(report, cfg);
                showScene('report');
            } catch (e) { showRetryArea(`报告解析失败：${e.message}`); }
        }

        // 正确解析格式化数字，支持"万"/"k"以及千分位逗号
        function parseCount(raw) {
            const s = String(raw || '').trim().replace(/,|，/g, '');
            if (/万/.test(s)) { const n = parseFloat(s.replace('万', '')); return isNaN(n) ? 0 : Math.round(n * 10000); }
            if (/k$/i.test(s)) { const n = parseFloat(s); return isNaN(n) ? 0 : Math.round(n * 1000); }
            const n = parseInt(s, 10); return isNaN(n) ? 0 : n;
        }

        // 格式化函数
        function fmtRate(r) {
            if (r === 0) return '0%';
            if (r < 0.1) return '<0.1%';
            if (r < 1) return r.toFixed(1) + '%';
            return Math.round(r) + '%';
        }

        let _reportData = null;

        function renderReport(r, cfg) {
            _reportData = r;

            // 其余国家两列

            // 飞行地图初始化
            const mapSlot = document.getElementById('mapSlot');

                if (_geoMapInstance) { _geoMapInstance.destroy(); _geoMapInstance = null; }

                function _initMap(origin) {
                    const hint = document.getElementById('mapOriginHint');
                    if (hint && origin._fromGeo) {
                        // 若已获取精确位置则提示坐标
                        hint.textContent = `● ${origin.lat.toFixed(1)}°, ${origin.lon.toFixed(1)}°`;

                    _geoMapInstance = new GeoFlightMap(mapSlot, entries, origin);
                }

                // 先用时区猜测快速渲染，geolocation 成功后重建
                const guessed = guessOrigin();
                _initMap(guessed);

                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        pos => {
                            const precise = { lon: pos.coords.longitude, lat: pos.coords.latitude, _fromGeo: true };
                            // 若精确位置与猜测差距较大才重建
                            if (Math.hypot(precise.lon - guessed.lon, precise.lat - guessed.lat) > 3) {

        const PROTO_COLORS = {
            vless: '#0ea5a0', vmess: '#d97706', trojan: '#7c3aed', ss: '#2563eb', ssr: '#1d4ed8',
            http: '#059669', socks5: '#64748b', hysteria: '#db2777', hy2: '#be185d', tuic: '#0891b2',
        };
        function getProtoColor(name) { return PROTO_COLORS[name.toLowerCase().replace(/[^a-z0-9]/g, '')] || '#94a3b8'; }

        function buildDonutSVG(entries, total, size) {
            size = size || 110;
            const r = size * 0.38, cx = size / 2, cy = size / 2;
            const circumference = 2 * Math.PI * r;
            let offset = 0;
            const GAP = circumference * 0.008;

            const segments = entries.map(([k, v]) => {
                const frac = v / total;
                const dash = Math.max(0, circumference * frac - GAP);
                const color = getProtoColor(k);
                const seg = `<circle cx="${cx}" cy="${cy}" r="${r}"
            fill="none" stroke="${color}" stroke-width="${size * 0.13}"
            stroke-dasharray="${dash} ${circumference - dash}"
            stroke-dashoffset="${-offset}"
            stroke-linecap="butt"
            style="transition:stroke-dasharray .6s cubic-bezier(.4,0,.2,1)"/>`;
                offset += circumference * frac;
                return seg;
            });

            const inner = `<text x="${cx}" y="${cy - 4}" text-anchor="middle"
        font-size="${size * 0.17}" font-weight="800" fill="var(--fg)">${total}</text>
        <text x="${cx}" y="${cy + size * 0.13}" text-anchor="middle"
        font-size="${size * 0.1}" fill="var(--muted)">节点</text>`;

            return `<svg class="proto-donut-svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="transform:rotate(-90deg)">
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--border)" stroke-width="${size * 0.13}"/>
        ${segments.join('')}
        <g style="transform:rotate(90deg);transform-origin:${cx}px ${cy}px">${inner}</g>
    </svg>`;
        }

        function renderProto(ga) {

            const donutSVG = buildDonutSVG(entries, total, 110);
            const donutList = entries.map(([k, v]) => {
                const pct = Math.round(v / total * 100);

                return `<div class="proto-donut-row">

            <span class="proto-donut-name" style="color:${color}">${k.toUpperCase()}</span>
