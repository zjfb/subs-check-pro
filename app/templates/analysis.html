<!-- app\templates\analysis.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分析报告 - Subs-Check-PRO</title>
    <link rel="icon" type="image/svg+xml" href="/static/icon/favicon.svg" />
    <link rel="stylesheet" href="/static/css/admin.css">
    <script src="/static/js/libs/yaml.bundle.js?v20260109"></script>
    <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
        margin: 0; padding: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        overflow-x: hidden;
    }

    /* ════════════════════════════════════════
       登录场景
    ════════════════════════════════════════ */
    .login-scene {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px 16px;
        min-height: 100vh;
        gap: 16px;
    }

    .login-card {
        width: 100%;
        max-width: 400px;
        border-radius: 16px;
        padding: 42px 28px 12px;
        box-shadow: var(--glass-shadow);
        animation: fadeUp 0.3s ease-out;
        overflow: hidden;
    }

    /* 登录卡片内容区（footer以上） */
    .login-card-body {
        padding-bottom: 24px;
    }

    /* 登录底部版权栏：独立于卡片内容，贴底，窄边距 */
    .login-card-footer {
        border-top: 1px solid var(--border);
        padding: 10px 0px;
        width:100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .brand-info {
        display: flex; align-items: center; gap: 7px;
        font-size: 12px; font-weight: 700; color: var(--muted);
    }
    .brand-info img { width: 14px; height: 14px; }
    .footer-meta { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

    .login-bottom {
        margin-top:20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
    }

    /* ════════════════════════════════════════
       报告场景
    ════════════════════════════════════════ */
    .report-scene {
        display: none;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
    }

    /* 顶部导航栏 */
    .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 52px;
        padding: 0 16px 0 20px;
        border-bottom: 1px solid var(--border);
        background: var(--glass-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        flex-shrink: 0;
        z-index: 100;
    }

    .topbar-brand {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        font-weight: 700;
        color: var(--muted);
    }
    .topbar-brand img { width: 16px; height: 16px; }

    .topbar-meta {
        flex: 1;
        text-align: center;
        font-size: 10px;
        color: var(--muted);
        letter-spacing: 0.04em;
        padding: 0 12px;
    }

    .topbar-actions {
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .topbar-btn {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 5px 10px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        font-size: 11px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        transition: color 0.15s, border-color 0.15s, background 0.15s;
        white-space: nowrap;
    }
    .topbar-btn svg { width: 12px; height: 12px; flex-shrink: 0; }
    .topbar-btn:hover {
        color: var(--fg);
        border-color: var(--fg);
        background: color-mix(in srgb, var(--fg) 6%, transparent);
    }
    .topbar-btn.danger:hover {
        color: var(--danger);
        border-color: var(--danger);
        background: color-mix(in srgb, var(--danger) 8%, transparent);
    }

    /* ── 主体区域 ── */
    .body-area {
        display: flex;
        flex: 1;
        overflow: hidden;
    }

    /* ════════════════════════════════════════
       侧边栏（大屏）
    ════════════════════════════════════════ */
    .sidebar {
        width: 180px;
        flex-shrink: 0;
        border-right: 1px solid var(--border);
        background: var(--glass-bg);
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        gap: 2px;
        padding: 12px 8px;
        overflow-y: auto;
        scrollbar-width: none;
    }
    .sidebar::-webkit-scrollbar { display: none; }

    .sidebar-label {
        font-size: 9px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        padding: 4px 8px 8px;
        opacity: 0.6;
    }

    .sidebar-btn {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 10px;
        border-radius: 8px;
        border: none;
        background: transparent;
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        transition: color 0.15s, background 0.15s;
        text-align: left;
        width: 100%;
    }
    .sidebar-btn svg { width: 15px; height: 15px; flex-shrink: 0; }
    .sidebar-btn .s-badge {
        margin-left: auto;
        font-size: 9px;
        font-weight: 700;
        padding: 1px 5px;
        border-radius: 99px;
        background: var(--border);
        color: var(--muted);
        flex-shrink: 0;
    }
    .sidebar-btn:hover {
        color: var(--fg);
        background: color-mix(in srgb, var(--fg) 6%, transparent);
    }
    .sidebar-btn.active {
        color: var(--accent);
        background: color-mix(in srgb, var(--accent) 10%, transparent);
    }
    .sidebar-btn.active .s-badge {
        background: color-mix(in srgb, var(--accent) 20%, transparent);
        color: var(--accent);
    }

    .sidebar-divider {
        display: block;
        height: 0;
        border-top: 1px solid var(--border);
        margin: 4px 4px;
        flex-shrink: 0;
        align-self: stretch;
    }

    /* ════════════════════════════════════════
       顶部 Tab 栏（小屏）
    ════════════════════════════════════════ */
    .tab-bar {
        display: none;
        align-items: center;
        justify-content: center;
        gap: 2px;
        padding: 0 12px;
        height: 44px;
        border-bottom: 1px solid var(--border);
        background: var(--glass-bg);
        overflow-x: auto;
        scrollbar-width: none;
        flex-shrink: 0;
    }
    .tab-bar::-webkit-scrollbar { display: none; }

    .tab-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        border-radius: 8px;
        border: none;
        background: transparent;
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        white-space: nowrap;
        transition: color 0.15s, background 0.15s;
        flex-shrink: 0;
    }
    .tab-btn svg { width: 13px; height: 13px; }
    .tab-btn:hover { color: var(--fg); background: color-mix(in srgb, var(--fg) 6%, transparent); }
    .tab-btn.active {
        color: var(--accent);
        background: color-mix(in srgb, var(--accent) 10%, transparent);
    }

    /* ════════════════════════════════════════
       内容区
    ════════════════════════════════════════ */
    .content-area {
        flex: 1;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        min-width: 0;
    }

    .tab-content {
        display: none;
        flex: 1;
        overflow-y: auto;
        padding: 20px 24px;
    }
    .tab-content.active { display: block; }

    .tab-inner {
        max-width: 1100px;
        margin: 0 auto;
    }

    /* ════════════════════════════════════════
       响应式断点
    ════════════════════════════════════════ */
    @media (max-width: 720px) {
        .sidebar      { display: none; }
        .tab-bar      { display: flex; }
        .topbar-meta  { display: none; }
        .tab-btn span { display: none; }
        .tab-content  { padding: 12px; }
        .info-chips   { grid-template-columns: repeat(2, 1fr); }
        .geo-split    { grid-template-columns: 1fr; }
        .geo-col + .geo-col { border-left: none; border-top: 1px solid var(--border); }
        .overview-grid      { grid-template-columns: 1fr !important; }
        .summary-chips-grid { grid-template-columns: repeat(2, 1fr) !important; }
        .proto-grid   { grid-template-columns: 1fr !important; }
    }
    @media (min-width: 721px) and (max-width: 1100px) {
        .overview-grid { grid-template-columns: 1fr 1fr; }
        .summary-chips-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (min-width: 1101px) {
        .tab-content { padding: 24px 32px; }
        .overview-grid { grid-template-columns: 1fr 1fr 1fr; }
        .summary-chips-grid { grid-template-columns: repeat(4, 1fr); }
    }

    /* ════════════════════════════════════════
       通用组件
    ════════════════════════════════════════ */
    .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px 10px;
        border-radius: 99px;
        font-size: 9px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 20px;
        border: 1px solid var(--border);
        color: var(--idle);
    }

    h1 {
        font-size: 15px;
        font-weight: 600;
        margin: 0 0 6px;
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        letter-spacing: 0.02em;
        text-transform: uppercase;
    }
    h1 svg { width: 16px; height: 16px; flex-shrink: 0; }

    .desc { font-size: 13px; color: var(--muted); line-height: 1.6; margin: 0 0 18px; }

    .section-title {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        margin: 0 0 10px;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .section-title-toggle {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        margin: 0 0 10px;
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        -webkit-user-select: none;
        user-select: none;
    }
    .toggle-line    { flex: 1; height: 1px; background: var(--border); }
    .toggle-chevron { width: 11px; height: 11px; flex-shrink: 0; transition: transform 0.2s; }
    .toggle-chevron.open { transform: rotate(180deg); }

    /* 登录表单 */
    .auth-area  { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }

    .auth-input {
        width: 100%;
        padding: 11px 14px;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        background: var(--input-bg);
        color: var(--fg);
        font-size: 14px;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
        font-family: inherit;
    }
    .auth-input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 15%, transparent);
    }
    .auth-input.error {
        border-color: var(--danger);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--danger) 12%, transparent);
    }
    .auth-hint { font-size: 12px; color: var(--danger); min-height: 16px; margin: 0; }

    .btn-auth {
        width: 100%;
        padding: 11px 14px;
        border-radius: 10px;
        border: none;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        font-family: inherit;
        transition: opacity 0.18s, transform 0.12s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        margin-top: 4px;
    }
    .btn-auth:hover   { opacity: 0.88; transform: translateY(-1px); }
    .btn-auth:active  { opacity: 0.95; transform: translateY(0); }
    .btn-auth:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn-auth svg     { width: 15px; height: 15px; flex-shrink: 0; }

    .retry-area { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
    .retry-msg  { font-size: 13px; color: var(--muted); margin: 0; line-height: 1.6; }

    /* ════════════════════════════════════════
       Tab 1：概览 - 摘要重设计
       用结构化卡片代替文字段落
    ════════════════════════════════════════ */

    /* 一句话核心摘要 */
    .hero-summary {
        padding: 14px 18px;
        background: color-mix(in srgb, var(--accent) 6%, transparent);
        border-radius: 10px;
        border: 1px solid color-mix(in srgb, var(--accent) 20%, transparent);
        border-left: 3px solid var(--accent);
        margin-bottom: 16px;
        display: flex;
        align-items: flex-start;
        gap: 10px;
    }
    .hero-summary svg { width: 14px; height: 14px; flex-shrink: 0; margin-top: 2px; color: var(--accent); }
    .hero-summary-text {
        font-size: 13px;
        color: var(--fg);
        line-height: 1.7;
        flex: 1;
    }
    .hero-summary-text .hl { font-weight: 700; color: var(--accent); }
    .hero-summary-text .hl-ok { font-weight: 700; color: var(--success); }
    .hero-summary-text .hl-warn { font-weight: 700; color: var(--warning); }

    /* 摘要芯片网格 */
    .summary-chips-grid {
        display: grid;
        gap: 10px;
        margin-bottom: 16px;
    }

    .summary-chip {
        padding: 14px 16px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--glass-bg);
        display: flex;
        flex-direction: column;
        gap: 4px;
        position: relative;
        overflow: hidden;
        transition: border-color 0.15s, background 0.15s;
    }
    .summary-chip:hover {
        border-color: color-mix(in srgb, var(--accent) 30%, transparent);
        background: color-mix(in srgb, var(--accent) 4%, transparent);
    }
    .chip-icon {
        width: 28px; height: 28px;
        border-radius: 7px;
        display: flex; align-items: center; justify-content: center;
        margin-bottom: 4px;
        flex-shrink: 0;
    }
    .chip-icon svg { width: 14px; height: 14px; }
    .chip-value {
        font-size: 22px;
        font-weight: 800;
        line-height: 1;
        letter-spacing: -0.02em;
    }
    .chip-label {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
    }
    .chip-sub {
        font-size: 10px;
        color: var(--muted);
        opacity: 0.7;
        margin-top: 2px;
    }

    /* 媒体/AI 解锁行 */
    .unlock-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 16px;
    }
    .unlock-tag {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 4px 10px;
        border-radius: 99px;
        font-size: 11px;
        font-weight: 600;
        border: 1px solid var(--border);
        background: var(--glass-bg);
    }
    .unlock-tag .ut-dot {
        width: 5px; height: 5px;
        border-radius: 50%;
        flex-shrink: 0;
    }
    .unlock-tag .ut-count {
        color: var(--muted);
        font-size: 10px;
    }

    /* ── 线路质量 ── */
    .info-chips {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        margin-bottom: 16px;
    }
    .info-chip {
        padding: 14px 10px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--glass-bg);
        text-align: center;
    }
    .info-chip .chip-value { font-size: 18px; font-weight: 700; color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .info-chip .chip-label { font-size: 10px; color: var(--muted); margin-top: 4px; }
    .info-chip.chip-accent .chip-value { color: var(--accent); }

    /* 概览双列 */
    .overview-grid {
        display: grid;
        gap: 12px;
    }

    .stat-panel {
        padding: 16px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--glass-bg);
    }
    .panel-title {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: var(--muted);
        margin-bottom: 12px;
    }

    .quality-row { display: flex; gap: 10px; margin-bottom: 12px; }
    .quality-item {
        flex: 1; text-align: center; padding: 12px 4px;
        border-radius: 8px; background: var(--input-bg); border: 1px solid var(--border);
    }
    .quality-val   { font-size: 20px; font-weight: 700; }
    .quality-label { font-size: 10px; color: var(--muted); margin-top: 4px; }

    .cf-breakdown { display: flex; flex-direction: column; gap: 5px; }
    .cf-group { display: flex; align-items: flex-start; gap: 6px; }
    .cf-group-title { flex-shrink: 0; width: 68px; font-weight: 600; padding-top: 2px; font-size: 10px; }
    .cf-tags  { display: flex; flex-wrap: wrap; gap: 3px; }
    .cf-tag   {
        display: inline-flex; align-items: center; gap: 2px;
        padding: 1px 6px; border-radius: 99px;
        border: 1px solid var(--border); font-size: 10px; background: var(--glass-bg);
    }
    .cf-tag em { font-style: normal; color: var(--muted); }

    /* 快速导航 */
    .nav-card {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--input-bg);
        cursor: pointer;
        font-family: inherit;
        color: var(--fg);
        transition: border-color 0.15s, background 0.15s;
        text-align: left;
        width: 100%;
        margin-bottom: 6px;
    }
    .nav-card:last-child { margin-bottom: 0; }
    .nav-card:hover {
        border-color: var(--accent);
        background: color-mix(in srgb, var(--accent) 6%, transparent);
    }
    .nav-card-left  { display: flex; align-items: center; gap: 8px; }
    .nav-card-left svg { width: 13px; height: 13px; color: var(--muted); flex-shrink: 0; }
    .nav-card-label { font-size: 13px; font-weight: 600; }
    .nav-card-right {
        font-size: 11px; color: var(--muted);
        display: flex; align-items: center; gap: 4px;
    }
    .nav-card-right svg { width: 11px; height: 11px; opacity: 0.5; }

    /* ════════════════════════════════════════
       Tab 2：地理分布
    ════════════════════════════════════════ */
    .geo-view {
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--glass-bg);
        overflow: hidden;
        margin-bottom: 4px;
    }

    /* 地图插槽：aspect-ratio 保持比例，填满宽度 */
    .map-slot {
        width: 100%;
        aspect-ratio: 16 / 7;
        min-height: 160px;
        max-height: 360px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--input-bg);
        border-bottom: 1px dashed color-mix(in srgb, var(--border) 80%, transparent);
        position: relative;
        overflow: hidden;
    }
    .map-slot-hint {
        text-align: center;
        opacity: 0.35;
    }
    .map-slot-hint svg { width: 28px; height: 28px; margin: 0 auto 6px; display: block; }
    .map-slot-hint span { font-size: 11px; color: var(--muted); }

    .geo-split { display: grid; grid-template-columns: 1fr 1fr; }
    .geo-col   { padding: 14px 16px; }
    .geo-col + .geo-col { border-left: 1px solid var(--border); }

    .geo-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
    .geo-key { font-size: 11px; font-weight: 600; width: 28px; flex-shrink: 0; color: var(--fg); }
    .geo-bar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .geo-bar { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.5s ease; }
    .geo-val { font-size: 11px; color: var(--muted); width: 22px; text-align: right; flex-shrink: 0; }

    /* ════════════════════════════════════════
       Tab 3：协议分析（增强版）
    ════════════════════════════════════════ */
    .proto-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 16px;
    }

    /* 协议大卡片 */
    .proto-card {
        padding: 16px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--glass-bg);
        display: flex;
        flex-direction: column;
        gap: 8px;
        transition: border-color 0.15s, transform 0.15s;
        cursor: default;
    }
    .proto-card:hover {
        border-color: var(--proto-color, var(--accent));
        transform: translateY(-1px);
    }
    .proto-card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
    }
    .proto-card-name {
        font-size: 13px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
    }
    .proto-card-count {
        font-size: 22px;
        font-weight: 800;
        letter-spacing: -0.02em;
    }
    .proto-card-bar-wrap {
        height: 4px;
        background: var(--border);
        border-radius: 99px;
        overflow: hidden;
    }
    .proto-card-bar {
        height: 100%;
        border-radius: 99px;
        background: var(--proto-color, var(--accent));

    /* 复制操作栏（固定在内容顶部） */

        align-items: center;
        gap: 8px;

<script>
// ── 主题初始化 ──
(function () {
    const saved  = localStorage.getItem('theme');
    const prefer = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    applyTheme(saved || prefer);
})();

function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('theme', theme);
    const isDark = theme === 'dark';
    const moon   = document.getElementById('iconMoon');
    const sun    = document.getElementById('iconSun');
    const label  = document.getElementById('themeLabel');
    if (moon)  moon.style.display  = isDark ? 'block' : 'none';
    if (sun)   sun.style.display   = isDark ? 'none'  : 'block';
    if (label) label.textContent   = isDark ? '深色'  : '浅色';
    const btn = document.getElementById('themeToggle');
    if (btn) btn.setAttribute('aria-pressed', String(isDark));
}

document.getElementById('themeToggle')?.addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme');
    applyTheme(cur === 'dark' ? 'light' : 'dark');
});

const STORAGE_KEY = 'subscheck_api_key';

function getKey() {
    try { return localStorage.getItem(STORAGE_KEY) || sessionStorage.getItem(STORAGE_KEY) || null; }
    catch { return null; }
}

async function sfetch(url, opts = {}) {
    const key = getKey();
    if (!key) return { ok: false, status: 401, error: '未认证' };
    opts.headers = { ...opts.headers, 'X-API-Key': key };
    try {
        const r    = await fetch(url, opts);
        const ct   = r.headers.get('content-type') || '';
        const text = await r.text();
        const payload = ct.includes('application/json') ? JSON.parse(text) : text;
        if (r.status === 401) {
            try { localStorage.removeItem(STORAGE_KEY); } catch {}
            showLoginArea('API 密钥已失效，请重新输入。');
            return { ok: false, status: 401, payload };
        }
        return r.ok ? { ok: true, status: r.status, payload } : { ok: false, status: r.status, payload };
    } catch (e) {
        return { ok: false, error: e.message };
    }
}

function showScene(name) {
    document.getElementById('loginScene').style.display  = name === 'login'  ? 'flex' : 'none';
    document.getElementById('reportScene').style.display = name === 'report' ? 'flex' : 'none';
}

function showLoading() {
    showScene('login');
    _setBadge('Analysis Report');
    document.getElementById('placeholderMsg').style.display  = '';
    document.getElementById('inlineLoginArea').style.display = 'none';
    document.getElementById('retryArea').style.display       = 'none';
}

function showLoginArea(hint = '') {
    showScene('login');
    _setBadge('Auth Required');
    document.getElementById('placeholderMsg').style.display  = 'none';
    document.getElementById('inlineLoginArea').style.display = '';
    document.getElementById('retryArea').style.display       = 'none';
    const input  = document.getElementById('inlineApiKey');
    const hintEl = document.getElementById('loginHint');
    if (hint) { input.classList.add('error'); hintEl.textContent = hint; }
    else { input.classList.remove('error'); hintEl.textContent = ''; input.placeholder = '输入 API 密钥...'; }
    setTimeout(() => input.focus(), 50);
}

function showRetryArea(msg, badge = 'Error') {
    showScene('login');
    _setBadge(badge);
    document.getElementById('placeholderMsg').style.display  = 'none';
    document.getElementById('inlineLoginArea').style.display = 'none';
    document.getElementById('retryArea').style.display       = '';
    document.getElementById('retryMsg').textContent          = msg;
}

function _setBadge(text) { document.getElementById('placeholderBadge').textContent = text; }

function switchTab(name) {
    document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + name));
}

async function inlineLogin() {
    const input  = document.getElementById('inlineApiKey');
    const btn    = document.getElementById('inlineLoginBtn');
    const hintEl = document.getElementById('loginHint');
    const k      = input?.value?.trim();
    input.classList.remove('error');
    hintEl.textContent = '';
    if (!k) { input.classList.add('error'); hintEl.textContent = '请输入 API 密钥'; input.focus(); return; }
    btn.disabled = true;
    try {
        const resp = await fetch('/api/status', { headers: { 'X-API-Key': k } });
        if (resp.status === 401) { input.classList.add('error'); hintEl.textContent = 'API 密钥无效，请重试'; input.value = ''; input.focus(); return; }
        if (!resp.ok) { showRetryArea(`验证失败（HTTP ${resp.status}），请检查服务状态。`); return; }
        try { localStorage.setItem(STORAGE_KEY, k); } catch {}
        await loadReport();
    } catch (e) {
        showRetryArea(`网络错误：${e.message}`);
    } finally {
        btn.disabled = false;
    }
}

async function loadReport() {
    showLoading();
    const r = await sfetch('/api/analysis-report');
    if (!r.ok) { if (r.status !== 401) showRetryArea(`加载失败（HTTP ${r.status}），请检查服务是否正常。`); return; }
    if (!r.payload?.report) { showRetryArea('尚未生成检测报告，请先在主界面运行一次节点检测。', 'No Data'); return; }
    try {
        const report = YAML.parse(r.payload.report);
        renderReport(report);
        showScene('report');
    } catch (e) {
        showRetryArea(`报告解析失败：${e.message}`);
    }
}

function doLogout() {
    try { localStorage.removeItem(STORAGE_KEY); } catch {}
    showLoginArea();
}

async function initPage() {
    if (!getKey()) { showLoginArea(); return; }
    await loadReport();
}

window.addEventListener('storage', e => {
    if (e.key === STORAGE_KEY && !e.newValue) showLoginArea('已在其他页面退出登录，请重新输入。');
});

// 构建一句话核心摘要
function buildHeroSentence(ci, ga) {
    const total    = ga.alive_count || 0;
    const geo      = Object.keys(ga.geography_distribution || {}).length;
    const duration = ci.check_duration || '-';
    const traffic  = ci.check_traffic  || '-';
    const speed    = ci.check_min_speed;
    const speedStr = (speed && String(speed) !== '0') ? `，速度下限 <span class="hl">${speed} KB/s</span>` : '';

    const qm       = ga.quality_metrics || {};
    const cfRatio  = qm.cf_consistent_ratio || '';

    return `本次检测耗时 <span class="hl">${duration}</span>，消耗流量 <span class="hl">${traffic}</span>，` +
           `共检测 <span class="hl">${ci.check_count||'-'}</span> 个节点${speedStr}，` +
           `获得 <span class="hl-ok">${total}</span> 个可用节点，` +
           `覆盖 <span class="hl">${geo}</span> 个国家/地区` +
           (cfRatio ? `，CF 中转占比 <span class="hl">${cfRatio}</span>` : '') + '。';
}

// 从摘要文字中解析媒体解锁信息
function parseUnlockFromSummary(text) {
    const unlockColors = {
        'Netflix': '#e50914', 'YouTube': '#ff0000', 'Disney+': '#113ccf',
        'TikTok': '#010101', 'GPT+': '#10a37f', 'GPT': '#10a37f', 'Gemini': '#4285f4'
    };
    const result = [];
    // 匹配 "Name:数字" 格式
    const mediaMatch = text.match(/流媒体解锁:\s*\[([^\]]*)\]/);
    const aiMatch    = text.match(/AI 解锁\[([^\]]*)\]/);
    for (const m of [mediaMatch, aiMatch]) {
        if (!m) continue;
        const items = m[1].split(',').map(s => s.trim()).filter(Boolean);
        for (const item of items) {
            const [name, count] = item.split(':').map(s => s.trim());
            if (name && count) {
                result.push({ name, count, color: unlockColors[name] || 'var(--muted)' });
            }
        }
    }
    return result;
}

function cfGroup(title, obj, color) {
    const entries = Object.entries(obj).sort((a, b) => b[1] - a[1]);
    if (!entries.length) return '';
    return `
        <div class="cf-group">
            <span class="cf-group-title" style="color:${color}">${title}</span>
            <span class="cf-tags">
                ${entries.map(([k, v]) => `<span class="cf-tag">${k}<em>${v}</em></span>`).join('')}
            </span>
        </div>
    `;
}

// ── Tab 2：地理分布 ──────────────────────────────────────────
function renderGeo(ga) {
    const geo     = ga.geography_distribution || {};
    const entries = Object.entries(geo).sort((a, b) => b[1] - a[1]);
    const maxVal  = entries[0]?.[1] || 1;

    if (!entries.length) {
        document.getElementById('geoBars').innerHTML = '<div style="padding:16px;color:var(--muted);font-size:13px">暂无地区数据</div>';
        return;
    }
    const half  = Math.ceil(entries.length / 2);
    const left  = entries.slice(0, half);
    const right = entries.slice(half);
    const barRow = ([k, v]) => `
        <div class="geo-row">
            <span class="geo-key">${k}</span>
            <div class="geo-bar-wrap">
                <div class="geo-bar" style="width:${Math.round(v / maxVal * 100)}%"></div>
            </div>
            <span class="geo-val">${v}</span>
        </div>
    `;
    document.getElementById('geoBars').innerHTML = `
        <div class="geo-col">${left.map(barRow).join('')}</div>
        <div class="geo-col">${right.length ? right.map(barRow).join('') : ''}</div>
    `;
}

// ── Tab 3：协议分析（增强版）──────────────────────────────────
const PROTO_COLORS = {
    vless: '#0ea5a0', vmess: '#d97706', trojan: '#7c3aed',
    ss: '#2563eb', ssr: '#1d4ed8', http: '#059669',
    socks5: '#64748b', hysteria: '#db2777', hy2: '#be185d',
    tuic: '#0891b2'
};

function getProtoColor(name) {
    const key = name.toLowerCase().replace(/[^a-z0-9]/g, '');
    return PROTO_COLORS[key] || '#94a3b8';
}

function renderProto(ga) {
    const proto   = ga.protocol_distribution || {};
    const total   = ga.alive_count           || 1;
    const entries = Object.entries(proto).sort((a, b) => b[1] - a[1]);

    if (!entries.length) {
        document.getElementById('protoContent').innerHTML = '<p style="color:var(--muted);font-size:13px">暂无协议数据</p>';
        return;
    }

    // 彩色总览条
    const summaryBar = entries.map(([k, v]) => {
        const pct = Math.max(2, Math.round(v / total * 100));
        return `<div class="proto-summary-seg" style="flex:${pct};background:${getProtoColor(k)}" title="${k}: ${v} (${Math.round(v/total*100)}%)"></div>`;
    }).join('');

    // 图例
    const legend = entries.map(([k]) =>
        `<div class="proto-legend-item">
            <span class="proto-legend-dot" style="background:${getProtoColor(k)}"></span>
            ${k}
        </div>`
    ).join('');

    // 协议卡片网格
    const cards = entries.map(([k, v]) => {
        const pct   = Math.round(v / total * 100);
        const color = getProtoColor(k);
        const cls   = 'proto-' + k.toLowerCase().replace(/[^a-z0-9]/g,'');
        return `
            <div class="proto-card ${cls}" style="--proto-color:${color}">
                <div class="proto-card-header">
                    <span class="proto-card-name" style="color:${color}">${k}</span>
                    <span class="proto-card-pct">${pct}%</span>
                </div>
                <div class="proto-card-count" style="color:${color}">${v}</div>
                <div class="proto-card-bar-wrap">
                    <div class="proto-card-bar" style="width:${pct}%"></div>
                </div>
                <div class="proto-card-pct" style="color:var(--muted)">共 ${total} 个节点中占 ${v} 个</div>
            </div>
        `;
    }).join('');

    document.getElementById('protoContent').innerHTML = `
        <div class="section-title">协议总览（${entries.length} 种 / ${total} 节点）</div>
        <div class="proto-summary-bar">${summaryBar}</div>
        <div class="proto-legend">${legend}</div>
        <div class="proto-grid">${cards}</div>
    `;
}

        `;
    }

    if (!subsBad.length) { document.getElementById('badContent').innerHTML = ''; return; }
    document.getElementById('badContent').innerHTML = `
        <div class="section-title-toggle" onclick="toggleBad()">
            失效订阅&nbsp;<span style="font-weight:400;text-transform:none;letter-spacing:0">(${subsBad.length})</span>
            <span class="toggle-line"></span>
            <svg class="toggle-chevron" id="badChevron" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"/>
            </svg>
        </div>
        <div id="badList" style="display:none">
            <div class="bad-list">
                ${subsBad.map(s => {
                    const stats = s.stats || {};
                    return `
                        <div class="bad-item">
                            <span class="bad-url" title="${esc(s.url)}">${esc(s.url)}</span>
                            <span class="bad-count">${stats.success||0}/${stats.total||0}</span>
                        </div>
                    `;
                }).join('')}
            </div>
        </div>
    `;
}

// ── 复制功能 ──────────────────────────────────────────────────
function copyUrls(asYaml) {
    if (!_reportData) return;
    const subs    = _reportData.subs_ranking     || [];
    const subsBad = _reportData.subs_ranking_bad || [];
    const includeBad = document.getElementById('copyIncludeBad')?.checked;

    const btnId = asYaml ? 'copyYamlBtn' : 'copyUrlsBtn';
    let text = '';

    if (asYaml) {
        // YAML 格式，可直接替换配置段
        const fmtSub = (s) => {
            const stats  = s.stats || {};
            const protos = s.protocols
                ? Object.entries(s.protocols).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`${k}: ${v}`).join('; ') : '';
            const rateStr = String(stats.rate || '0%');
            return `  - ${s.url} # ${rateStr} (${stats.success||0}/${stats.total||0})${protos ? ' ['+protos+']' : ''}`;
        };

        text += `# 达标订阅列表\nsub-urls:\n`;
        text += subs.map(fmtSub).join('\n');

        if (includeBad && subsBad.length) {
            text += `\n\n# 成功率为 0 的订阅\nsub-urls-bad:\n`;
            text += subsBad.map(s => {
                const st = s.stats || {};
                return `  - ${s.url} # 0.0% (${st.success||0}/${st.total||0})`;
            }).join('\n');
        }
    } else {
        // 纯 URL，每行一个
        text = subs.map(s => s.url).join('\n');
        if (includeBad && subsBad.length) {
            text += '\n\n# 失效订阅\n' + subsBad.map(s => s.url).join('\n');
        }
    }

    navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById(btnId);
        if (!btn) return;
        btn.classList.add('copied');
        const prev = btn.innerHTML;
        btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> 已复制`;
        setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = prev; }, 2000);
    }).catch(() => {
        // 降级：textarea 手动复制
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0;';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        ta.remove();
    });
}

function toggleBad() {
    const list    = document.getElementById('badList');
    const chevron = document.getElementById('badChevron');
    const open    = list.style.display === 'none';
    list.style.display = open ? '' : 'none';
    chevron.classList.toggle('open', open);
}

function esc(str) {
    return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

initPage();
</script>
