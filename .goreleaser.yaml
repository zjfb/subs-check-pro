version: 2

before:
  hooks:
    - go mod tidy
    - go get -u github.com/sinspired/subs-check-pro-webui
    - go install github.com/tc-hib/go-winres@latest
    - go generate ./...

release:
  # 自动检测是否为预发布版本 (如 v2.5.0-rc.1 会自动标记为 Pre-release)
  prerelease: auto

  # 底部说明模板
  footer: |
    ---
    - 💡 **完整变更日志**: [{{ .PreviousTag }}...{{ .Tag }}]({{ .GitURL }}/compare/{{ .PreviousTag }}...{{ .Tag }})
    - 🐳 Docker 镜像已发布 `docker pull sinspired/subs-check-pro:latest`
    - 💬 反馈方式
      - 👥 Telegram 群组：[subs-check性能版](https://t.me/subs_check_pro)
      - 📣 Telegram 频道：[关注频道](https://t.me/sinspired_ai)

# 变更日志配置
changelog:
  sort: desc
  use: github
  # 过滤掉不需要显示在日志中的提交
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^style:"
      - "^Merge pull request"
      - "^Merge branch"
      - "go mod tidy"
      - "^(?i)chore\\(doc\\):" # 过滤单纯的 README 调整

  format: "{{ .SHA }}: {{ .Message }}"
  # 提交分组配置
  groups:
    - title: "✨ 新功能"
      # 匹配 feat: 或 feat(scope): 且不区分大小写
      regexp: "^(?i)feat(\\([\\w-]+\\))?:+.*$"
      order: 0
    - title: "🐛 Bug 修复"
      # 匹配 fix: 或 fix(scope): 且不区分大小写
      regexp: "^(?i)fix(\\([\\w-]+\\))?:+.*$"
      order: 1
    - title: "🚀 性能优化"
      # 匹配 perf: 或 perf(scope): 且不区分大小写
      regexp: "^(?i)perf(\\([\\w-]+\\))?:+.*$"
      order: 2
    - title: "🔧 重构维护"
      # 匹配 refactor/chore/build/ci 及其带作用域的形式
      regexp: "^(?i)(chore|refactor|build|ci)(\\([\\w-]+\\))?:+.*$"
      order: 3
    - title: "📝 文档更新"
      regexp: "^(?i)docs(\\([\\w-]+\\))?:+.*$"
      order: 4
    - title: "📦 其他"
      order: 999

# 构建配置
builds:
  - id: subs-check-pro
    env:
      - CGO_ENABLED=0
      - GOEXPERIMENT=jsonv2
    targets:
      # Desktop / Server
      - linux_amd64
      - linux_arm64
      - linux_arm_7
      - windows_amd64
      - windows_arm64
      - darwin_amd64
      - darwin_arm64
      # openwrt / 路由器
      - linux_mipsle_softfloat
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.Version={{ .Version }} -X main.CurrentCommit={{ .ShortCommit }}

# 归档配置
archives:
  - ids:
      - subs-check-pro
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else if eq .Arch "arm64" }}aarch64
      {{- else if eq .Arch "arm" }}armv7
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: zip

# Docker 镜像多架构自动打包与分发
dockers_v2:
  - id: subs-check-pro
    dockerfile: Dockerfile.goreleaser
    # 同时发布到 GitHub Container Registry 和 Docker Hub
    images:
      - "ghcr.io/{{ .Env.GITHUB_REPOSITORY }}"
      - "{{ .Env.DOCKERHUB_USERNAME }}/subs-check-pro"

    # 自动发布 latest 和 版本号
    tags:
      - "{{ .Version }}"
      - "{{ if not .IsNightly }}latest{{ end }}"

    # docker buildx 的平台列表
    platforms:
      - linux/amd64
      - linux/arm64
      - linux/arm/v7

    # OCI 镜像规范标签
    annotations:
      "org.opencontainers.image.title": "subs-check-pro"
      "org.opencontainers.image.description": "高性能代理检测筛选工具，支持高并发测活、测速、媒体检测"
      "org.opencontainers.image.created": "{{.Date}}"
      "org.opencontainers.image.name": "{{.ProjectName}}"
      "org.opencontainers.image.revision": "{{ .FullCommit }}"
      "org.opencontainers.image.version": "{{ .Version }}"
      "org.opencontainers.image.source": "{{.GitURL}}"

      "org.opencontainers.image.base.name": "{{.BaseImage}}"
      "org.opencontainers.image.base.digest": "{{.BaseImageDigest}}"

    # 正式版本创建物料清单 (SBOM)，预发布版本跳过
    sbom: "{{ not .IsNightly }}"

# 压缩可执行文件
upx:
  - ids: [subs-check-pro]
    enabled: true
    goos: [linux]
    goarch: [amd64, arm64, arm]

  - ids: [subs-check-pro]
    enabled: true
    goos: [windows]
    goarch: [amd64]
