name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write
  id-token: write # 用于支持高安全性镜像溯源签名证明

jobs:
  releaser:
    if: github.ref != 'refs/heads/v2'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Setup UPX
        uses: crazy-max/ghaction-upx@v4
        with:
          install-only: true
          version: latest

      # 为 GoReleaser 准备 Docker 环境
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Delete existing release
        run: |
          gh release view ${{ github.ref_name }} &>/dev/null && \
            gh release delete ${{ github.ref_name }} --yes || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 自动发布到 GitHub Releases 和 Docker Hub，使用 .goreleaser.yaml 中的配置
      - name: Create GitHub release and Docker images
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

  notify:
    if: github.ref != 'refs/heads/v2'
    runs-on: ubuntu-latest
    needs: [releaser]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Get release notes
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo 'notes<<EOF'
            gh release view "${{ github.ref_name }}" --json body -q .body
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Send notifications
        uses: sinspired/multi-release-notify@v1
        with:
          summary: >-
            高性能代理测活|测速|媒体解锁检测内核，可体验 [GUI](https://github.com/sinspired/subs-check-pro-gui)；感谢 @danhuangchangqun @leon0576 反馈
          release_notes: ${{ steps.release.outputs.notes }}

          email_url: ${{ secrets.EMAIL_APPRISE_URL }}
          telegram_url: ${{ secrets.TELEGRAM_APPRISE_URL }}
          slack_url: ${{ secrets.DINGTALK_APPRISE_URL }}
          bark_url: ${{ secrets.BARK_APPRISE_URL }}

          urls: |
            ntfy://subs-check-pro
